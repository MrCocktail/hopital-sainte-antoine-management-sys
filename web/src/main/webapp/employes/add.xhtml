<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden max-w-2xl mx-auto">
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-8 text-center relative overflow-hidden">
            <h2 class="text-2xl font-extrabold tracking-wide uppercase">Ajouter un nouvel Employé</h2>
            <p class="text-blue-100 text-sm mt-1">Enregistrement du personnel administratif et de soutien</p>
            <div class="absolute -bottom-6 left-0 right-0 h-12 bg-white rounded-t-[50%]"></div>
        </div>

        <h:form id="employeAddForm" styleClass="p-8 space-y-5 mt-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nom</label>
                    <h:inputText value="#{employeBean.nouveauEmploye.nom}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Prénom</label>
                    <h:inputText value="#{employeBean.nouveauEmploye.prenom}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Téléphone</label>
                    <h:inputText value="#{employeBean.nouveauEmploye.telephone}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Adresse</label>
                    <h:inputText value="#{employeBean.nouveauEmploye.adresse}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Poste / Fonction</label>
                    <h:inputText value="#{employeBean.nouveauEmploye.poste}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Salaire de Base</label>
                    <h:inputText value="#{employeBean.nouveauEmploye.salaireBase}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <h:commandButton value="Enregistrer l'Employé" action="#{employeBean.enregistrerEmploye()}" styleClass="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition cursor-pointer" />
                <h:commandButton value="Annuler" action="#{navigationBean.changerVue('employees-all')}" immediate="true" styleClass="px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-lg transition cursor-pointer" />
            </div>
        </h:form>
    </div>
</ui:composition>
