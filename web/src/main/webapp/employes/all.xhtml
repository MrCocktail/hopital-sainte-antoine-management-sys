<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <f:event type="preRenderView" listener="#{employeBean.rafraichirListe()}" />

    <div class="space-y-6">
        <div class="flex justify-between items-center bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex items-center gap-3">
                <h2 class="text-xl font-bold text-slate-700">Tous les Employés</h2>
                <h:form id="addViewEmpForm">
                    <h:commandLink action="#{navigationBean.changerVue('employees-add')}" 
                                   styleClass="flex items-center justify-center w-8 h-8 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-sm transition group"
                                   title="Ajouter un employé">
                        <span class="material-icons text-lg group-hover:scale-110 transition-transform">add</span>
                    </h:commandLink>
                </h:form>
            </div>

            <h:form id="searchEmpForm">
                <div class="flex gap-2">
                    <h:inputText value="#{employeBean.searchTerm}" 
                                 styleClass="text-sm px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 w-64 transition" />
                    <h:commandButton value="Rechercher" action="#{employeBean.rechercher()}" 
                                     styleClass="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-4 py-2 rounded-lg transition cursor-pointer" />
                </div>
            </h:form>
        </div>

        <h:form id="listEmpForm">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <ui:repeat value="#{employeBean.listeEmployes}" var="e">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col items-center p-6 relative group hover:shadow-md transition-shadow">
                        
                        <div class="w-20 h-20 bg-gradient-to-tr from-slate-600 to-slate-400 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-sm mb-4">
                            #{e.prenom.substring(0,1)}#{e.nom.substring(0,1)}
                        </div>

                        <h4 class="text-base font-bold text-slate-800 text-center">#{e.prenom} #{e.nom}</h4>
                        <p class="text-xs text-slate-600 font-medium bg-slate-100 px-2.5 py-1 rounded-full mt-1">#{e.poste}</p>
                        
                        <!-- <div class="text-xs text-blue-600 font-bold mt-2">
                            Base : #{e.salaireBase} HTG
                        </div> -->

                        <div class="w-full border-t border-slate-100 my-4 pt-3 text-center space-y-1">
                            <p class="text-xs text-slate-500 flex items-center justify-center gap-1">
                                <span class="material-icons text-sm text-slate-400">phone</span> #{e.telephone}
                            </p>
                            <p class="text-xs text-slate-400 flex items-center justify-center gap-1 truncate px-2">
                                <span class="material-icons text-sm text-slate-400">place</span> #{e.adresse}
                            </p>
                        </div>

                        <div class="grid grid-cols-2 gap-3 w-full mt-2">
                            <h:commandLink action="#{employeBean.preparerEdition(e)}" styleClass="flex items-center justify-center gap-1 text-xs bg-slate-100 hover:bg-blue-600 hover:text-white text-slate-600 py-2 rounded-lg font-semibold transition w-full">
                                <span class="material-icons text-sm">edit</span> Éditer
                            </h:commandLink>
                            <h:commandLink action="#{employeBean.supprimerEmploye(e)}" styleClass="flex items-center justify-center gap-1 text-xs bg-red-50 hover:bg-red-600 hover:text-white text-red-600 py-2 rounded-lg font-semibold transition w-full">
                                <span class="material-icons text-sm">delete</span> Supprimer
                            </h:commandLink>
                        </div>
                    </div>
                </ui:repeat>
            </div>
        </h:form>
    </div>
</ui:composition>
