<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>HSA - Medical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style type="text/css">
        .nav-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font: inherit;
            padding: 0;
        }
        .nav-btn-sub {
            display: block;
            width: 100%;
            text-align: left;
            border: none;
            background: transparent;
            cursor: pointer;
            font: inherit;
        }
    </style>
</h:head>

<h:body style="margin:0; padding:0; background-color: #f8fafc;">
    <f:view>
    <div class="flex min-h-screen w-full">

        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 min-h-screen">

            <div class="h-16 flex items-center px-6 border-b border-slate-200 gap-2 bg-blue-600 text-white shrink-0">
                <span class="material-icons">local_hospital</span>
                <span class="text-lg font-bold tracking-wide">HSA DASHBOARD</span>
            </div>

            <h:form id="navForm" style="margin:0; padding:0;" styleClass="flex-1 flex flex-col">
                <!-- The Command Button -->
            <h:commandButton value="Submit Data" 
                             action="#{userBean.submitAction}" 
                             styleClass="btn-primary" />

                <div class="flex-1 p-4 flex flex-col gap-2">
                    <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider px-3 mb-1">Menu</p>

                    <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm #{navigationBean.vueActive == 'dashboard' ? 'bg-blue-50' : 'hover:bg-slate-50'}">
                        <span class="material-icons text-xl #{navigationBean.vueActive == 'dashboard' ? 'text-blue-600' : 'text-slate-600'}">dashboard</span>
                        <h:commandButton value="Dashboard"
                                         action="#{navigationBean.changerVue('dashboard')}"
                                         immediate="true"
                                         styleClass="nav-btn #{navigationBean.vueActive == 'dashboard' ? 'text-blue-600 font-bold' : 'text-slate-600'} transition" />
                    </div>

                    <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm #{navigationBean.vueActive == 'patients-all' ? 'bg-blue-50' : 'hover:bg-slate-50'}">
                        <span class="material-icons text-xl #{navigationBean.vueActive == 'patients-all' ? 'text-blue-600' : 'text-slate-600'}">people</span>
                        <h:commandButton value="Patients"
                                         action="#{navigationBean.changerVue('patients-all')}"
                                         immediate="true"
                                         styleClass="nav-btn #{navigationBean.vueActive == 'patients-all' ? 'text-blue-600 font-bold' : 'text-slate-600'} transition" />
                    </div>

                    <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm #{navigationBean.vueActive == 'medecins-all' ? 'bg-blue-50' : 'hover:bg-slate-50'}">
                        <span class="material-icons text-xl #{navigationBean.vueActive == 'medecins-all' ? 'text-blue-600' : 'text-slate-600'}">medical_services</span>
                        <h:commandButton value="Médecins"
                                         action="#{navigationBean.changerVue('medecins-all')}"
                                         immediate="true"
                                         styleClass="nav-btn #{navigationBean.vueActive == 'medecins-all' ? 'text-blue-600 font-bold' : 'text-slate-600'} transition" />
                    </div>

                    <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm #{navigationBean.vueActive == 'employees' ? 'bg-blue-50' : 'hover:bg-slate-50'}">
                        <span class="material-icons text-xl #{navigationBean.vueActive == 'employees' ? 'text-blue-600' : 'text-slate-600'}">badge</span>
                        <h:commandButton value="Employés &amp; Médecins"
                                         action="#{navigationBean.changerVue('employees')}"
                                         immediate="true"
                                         styleClass="nav-btn font-medium #{navigationBean.vueActive == 'employees' ? 'text-blue-600 font-bold' : 'text-slate-600'} transition" />
                    </div>

                    <div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm #{navigationBean.vueActive == 'payroll' ? 'bg-blue-50' : 'hover:bg-slate-50'}">
                        <span class="material-icons text-xl #{navigationBean.vueActive == 'payroll' ? 'text-blue-600' : 'text-slate-600'}">payments</span>
                        <h:commandButton value="Gestion Payroll"
                                         action="#{navigationBean.changerVue('payroll')}"
                                         immediate="true"
                                         styleClass="nav-btn font-medium #{navigationBean.vueActive == 'payroll' ? 'text-blue-600 font-bold' : 'text-slate-600'} transition" />
                    </div>
                </div>
            </h:form>

            <div class="p-4 border-t border-slate-200 flex items-center gap-3 bg-slate-50 shrink-0">
                <div class="w-9 h-9 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-sm">
                    B
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-slate-700 truncate">Bruno</p>
                    <p class="text-xs text-slate-400 truncate">RH &amp; Comptabilité</p>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto">

            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-lg font-bold text-slate-700">Hôpital Sainte-Antoine</h2>
                    <span class="px-2.5 py-1 text-xs font-semibold text-green-700 bg-green-50 border border-green-200 rounded-full">Serveur WildFly Actif</span>
                </div>
                <div class="text-sm text-slate-500 font-medium">
                    Ave. Poupelard, Port-au-Prince, Haïti
                </div>
            </header>

            <main class="flex-1 p-8 space-y-8">
                <h:panelGroup id="mainContent" layout="block">
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'dashboard'}">
                        <ui:include src="/dashboard.xhtml" />
                    </h:panelGroup>
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'patients-all'}">
                        <ui:include src="/patients/all.xhtml" />
                    </h:panelGroup>
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'patients-add'}">
                        <ui:include src="/patients/add.xhtml" />
                    </h:panelGroup>
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'patients-edit'}">
                        <ui:include src="/patients/edit.xhtml" />
                    </h:panelGroup>
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'medecins-all'}">
                        <ui:include src="/medecins/all.xhtml" />
                    </h:panelGroup>
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'medecins-add'}">
                        <ui:include src="/medecins/add.xhtml" />
                    </h:panelGroup>
                    <h:panelGroup layout="block" rendered="#{navigationBean.vueActive == 'medecins-edit'}">
                        <ui:include src="/medecins/edit.xhtml" />
                    </h:panelGroup>
                </h:panelGroup>
            </main>
        </div>
    </div>
    </f:view>
</h:body>
</html>
