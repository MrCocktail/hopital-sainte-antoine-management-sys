<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden max-w-2xl mx-auto">
        <div class="bg-gradient-to-r from-teal-600 to-teal-700 text-white p-8 text-center relative overflow-hidden">
            <h2 class="text-2xl font-extrabold tracking-wide uppercase">Modifier la fiche Patient</h2>
            <p class="text-teal-100 text-sm mt-1">Mise à jour des coordonnées système</p>
            <div class="absolute -bottom-6 left-0 right-0 h-12 bg-white rounded-t-[50%]"></div>
        </div>

        <h:form id="patientEditForm" styleClass="p-8 space-y-5 mt-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nom</label>
                <h:inputText value="#{patientBean.patientSelectionne.nom}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Prénom</label>
                <h:inputText value="#{patientBean.patientSelectionne.prenom}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Téléphone</label>
                <h:inputText value="#{patientBean.patientSelectionne.telephone}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Adresse</label>
                <h:inputText value="#{patientBean.patientSelectionne.adresse}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition" />
            </div>

            <div class="flex gap-4 pt-4">
                <h:commandButton value="Enregistrer les modifications" action="#{patientBean.mettreAJourPatient()}" styleClass="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg shadow transition cursor-pointer" />
                <h:commandButton value="Annuler" action="#{navigationBean.changerVue('patients-all')}" immediate="true" styleClass="px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-lg transition cursor-pointer" />
            </div>
        </h:form>
    </div>
</ui:composition>
