<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://jakarta.faces.html"
                xmlns:ui="http://jakarta.faces.facelets">

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden max-w-2xl mx-auto">
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-8 text-center relative overflow-hidden">
            <h2 class="text-2xl font-extrabold tracking-wide uppercase">Ajouter un nouveau Patient</h2>
            <p class="text-blue-100 text-sm mt-1">Complétez le dossier pour l'enregistrement à l'hôpital</p>
            <div class="absolute -bottom-6 left-0 right-0 h-12 bg-white rounded-t-[50%]"></div>
        </div>

        <h:form styleClass="p-8 space-y-5 mt-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nom du Patient</label>
                <h:inputText value="#{patientBean.nouveauPatient.nom}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Prénom</label>
                <h:inputText value="#{patientBean.nouveauPatient.prenom}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Téléphone</label>
                <h:inputText value="#{patientBean.nouveauPatient.telephone}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Adresse Résidentielle</label>
                <h:inputText value="#{patientBean.nouveauPatient.adresse}" styleClass="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" />
            </div>

            <div class="flex gap-4 pt-4">
                <h:commandButton value="Enregistrer le Patient" action="#{patientBean.enregistrerPatient()}" styleClass="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow transition cursor-pointer" />
                <h:commandButton value="Annuler" action="#{patientBean.changerVue('all')}" immediate="true" styleClass="px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-lg transition cursor-pointer" />
            </div>
        </h:form>
    </div>
</ui:composition>
